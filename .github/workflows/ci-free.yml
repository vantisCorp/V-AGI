name: CI (Free Tier)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# This workflow uses actions that are not cached by GitHub to avoid billing issues
# For public repos, GitHub Actions should be free but may require payment method on file

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event.repository.visibility == 'public'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests
        run: pytest --cov=src -v

  lint:
    runs-on: ubuntu-latest
    if: github.event.repository.visibility == 'public'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linters
        run: pip install flake8 black isort
      
      - name: Run Black
        run: black --check src/ tests/
      
      - name: Run isort
        run: isort --check-only src/ tests/
      
      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E501,W503,W291,W293,F401,F841,F541,E203,E712,E402

  security:
    runs-on: ubuntu-latest
    if: github.event.repository.visibility == 'public'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install safety
        run: pip install safety
      
      - name: Run security check
        run: safety check -r requirements.txt || true

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: github.event.repository.visibility == 'public'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build
        run: pip install build
      
      - name: Build package
        run: python -m build