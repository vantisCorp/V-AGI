name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install aiohttp pydantic pydantic-settings numpy pandas
          pip install cryptography pyjwt loguru argon2-cffi pyotp
          pip install flask flask-cors websockets
      
      - name: Create environment file
        run: |
          cat > .env << EOF
          SECRET_KEY=test-secret-key-for-ci-min-32-characters!
          ENCRYPTION_KEY=test-encryption-key-32-characters!
          JWT_SECRET_KEY=test-jwt-secret-key-min-32-chars!
          NEO4J_PASSWORD=test-neo4j-password
          EOF
      
      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linters
        run: pip install flake8 black isort
      
      - name: Run Black
        run: black --check src/ tests/ --line-length 100 || true
      
      - name: Run isort
        run: isort --check-only src/ tests/ || true
      
      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E501,W503 || true