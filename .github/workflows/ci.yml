name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install aiohttp pydantic pydantic-settings numpy pandas cryptography pyjwt loguru argon2-cffi pyotp flask flask-cors websockets

      - name: Create .env file for testing
        run: |
          echo "SECRET_KEY=test-secret-key-for-ci-min-32-characters!" >> .env
          echo "ENCRYPTION_KEY=test-encryption-key-32-characters!" >> .env
          echo "JWT_SECRET_KEY=test-jwt-secret-key-min-32-chars!" >> .env
          echo "NEO4J_PASSWORD=test-neo4j-password" >> .env

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install flake8 black isort

      - name: Run Black
        run: black --check src/ tests/ --line-length 100 || true

      - name: Run isort
        run: isort --check-only src/ tests/ || true

      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E501,W503 || true

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r src/ -ll || true

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: v-agi:${{ github.sha }}