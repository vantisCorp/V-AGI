version: '3.8'

services:
  # Redis Cache & Working Memory
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - omni-ai-network

  # Neo4j Knowledge Graph
  neo4j:
    image: neo4j:5.14-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/omni-ai-password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    networks:
      - omni-ai-network

  # OpenFOAM Simulation Engine
  openfoam:
    image: cfbarbed/openfoam:v2212
    volumes:
      - ./data/simulations:/home/openfoam/simulations
    networks:
      - omni-ai-network
    command: tail -f /dev/null

  # FreeCAD for CAD Operations
  freecad:
    image: freecad/freecad:0.21.2
    volumes:
      - ./data/cad:/home/freecad/cad
    networks:
      - omni-ai-network
    command: tail -f /dev/null

  # OMNI-AI Application
  omni-ai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=omni-ai-password
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - neo4j
    networks:
      - omni-ai-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - omni-ai
    networks:
      - omni-ai-network

volumes:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:

networks:
  omni-ai-network:
    driver: bridge